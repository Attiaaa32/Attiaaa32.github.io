 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Coach Attia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white p-4">
    <nav class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-bold text-red-500">ATTIA FITNESS</h1>
        <button onclick="document.getElementById('admin-modal').classList.remove('hidden')" class="bg-gray-700 p-2 rounded">🔐</button>
    </nav>

    <div id="content" class="text-center">
        <h2 id="nutrition-price" class="text-xl">جاري التحميل...</h2>
        <div id="transformations-grid" class="grid grid-cols-1 gap-4 mt-10"></div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4">
        <div class="bg-gray-800 p-6 rounded w-full max-w-sm">
            <input type="password" id="pass" placeholder="الباسورد" class="w-full p-2 mb-2 bg-gray-900 text-white rounded">
            <button onclick="login()" class="w-full bg-red-600 p-2 rounded mb-2">دخول</button>
            <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="w-full bg-gray-600 p-2 rounded">إغلاق</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient("https://wbsqjrmcdslvzvbvksmc.supabase.co", "sb_publishable_9ZJjDZTM6ZK1x5GmcyuLw_tE3Cussy");
        
        async function loadData() {
            const { data } = await supabase.from('site_data').select('*');
            if(data) document.getElementById('nutrition-price').innerText = "سعر النظام: " + data[0].content;
            
            const { data: trans } = await supabase.from('client_transformations').select('*');
            const grid = document.getElementById('transformations-grid');
            if(trans) grid.innerHTML = trans.map(t => <img src="${t.image_url}" class="w-full rounded">).join('');
        }

        function login() {
            if(document.getElementById('pass').value === '1920') {
                Swal.fire('تم الدخول', 'تقدر دلوقتي تضيف بياناتك من قاعدة البيانات', 'success');
                document.getElementById('admin-modal').classList.add('hidden');
            } else { Swal.fire('خطأ', 'الباسورد غلط', 'error'); }
        }
        loadData();
    </script>
</body>
</html>
