    <script>
        function toggleAdminModal() { document.getElementById('admin-modal').classList.toggle('active'); }
        function loginAdmin() {
            if(document.getElementById('admin-password').value === '1920') { 
                document.getElementById('admin-login-form').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
            } else { Swal.fire('خطأ', 'الباسورد غلط يا كوتش!', 'error'); }
        }

        async function loadSiteData() {
            const { data: siteData } = await _supabase.from('site_data').select('*');
            siteData?.forEach(item => {
                if(item.id === 'nutrition_price') document.getElementById('nutrition-price-display').innerText = item.content;
                if(item.id === 'coaching_price') document.getElementById('coaching-price-display').innerText = item.content;
            });
            const { data: transformData } = await _supabase.from('client_transformations').select('*');
            const container = document.getElementById('transformations-container');
            container.innerHTML = transformData?.map(item => 
                <div class="bg-gray-800 rounded-2xl overflow-hidden border border-gray-700">
                    <img src="${item.image_url}" class="w-full h-80 object-cover">
                    <div class="p-4 text-center"><h3 class="text-xl font-bold">${item.title}</h3></div>
                </div>
            ).join('') || '';
        }
async function updatePricesAndHero() {
            const nutPrice = document.getElementById('input-nutrition-price').value;
            const coachPrice = document.getElementById('input-coaching-price').value;
            await _supabase.from('site_data').update({ content: nutPrice }).eq('id', 'nutrition_price');
            await _supabase.from('site_data').update({ content: coachPrice }).eq('id', 'coaching_price');
            Swal.fire('تم!', 'الأسعار اتحدثت', 'success');
            loadSiteData();
        }

        async function uploadTransformation() {
            const title = document.getElementById('transformation-title').value;
            const file = document.getElementById('transformation-file').files[0];
            const { data: uploadData } = await _supabase.storage.from('transformations').upload(tr_${Date.now()}, file);
            const { data: urlData } = _supabase.storage.from('transformations').getPublicUrl(tr_${Date.now()});
            await _supabase.from('client_transformations').insert([{ title: title, image_url: urlData.publicUrl }]);
            Swal.fire('عاش!', 'البطل نزل الموقع', 'success');
            loadSiteData();
        }
        window.onload = loadSiteData;
    </script>
