<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Coach Attia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .blue-theme { color: #3b82f6; }
        .bg-blue-theme { background-color: #2563eb; }
    </style>
</head>
<body class="bg-gray-900 text-white p-4">
    
    <nav class="flex justify-between items-center mb-10 border-b border-gray-700 pb-4">
        <h1 class="text-2xl font-bold blue-theme">ATTIA FITNESS</h1>
        <button onclick="document.getElementById('admin-modal').classList.remove('hidden')" class="bg-gray-700 p-2 rounded">🔐</button>
    </nav>

    <div id="content" class="text-center">
        <h2 id="nutrition-price" class="text-xl mb-10">جاري تحميل الأسعار...</h2>
        <div id="transformations-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-xl w-full max-w-sm border border-blue-600">
            <h2 class="text-white mb-4">لوحة التحكم</h2>
            <input type="password" id="pass" placeholder="الباسورد" class="w-full p-2 mb-4 bg-gray-900 text-white rounded border border-blue-500">
            <button onclick="login()" class="w-full bg-blue-theme p-2 rounded mb-2 font-bold">دخول</button>
            <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="w-full bg-gray-600 p-2 rounded">إغلاق</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient("https://wbsqjrmcdslvzvbvksmc.supabase.co", "sb_publishable_9ZJjDZTM6ZK1x5GmcyuLw_tE3Cussy");
        
        async function loadData() {
            // جلب الأسعار
            const { data: priceData } = await supabase.from('site_data').select('*');
            if(priceData && priceData.length > 0) 
                document.getElementById('nutrition-price').innerText = "سعر النظام: " + priceData[0].content;
            
            // جلب الصور
            const { data: trans } = await supabase.from('client_transformations').select('*');
            const grid = document.getElementById('transformations-grid');
            if(trans) {
                grid.innerHTML = trans.map(t => 
                    <div class="bg-gray-800 p-2 rounded-lg border border-blue-900">
                        <img src="${t.image_url}" class="w-full rounded shadow-lg">
                        <p class="mt-2 text-blue-400 font-bold">${t.title || 'تحول بطل'}</p>
                    </div>
                ).join('');
            }
        }

        function login() {
            if(document.getElementById('pass').value === '1920') {
                Swal.fire('أهلاً كوتش!', 'تم الدخول بنجاح', 'success');
                document.getElementById('admin-modal').classList.add('hidden');
            } else { Swal.fire('خطأ', 'الباسورد غلط', 'error'); }
        }

        loadData();
    </script>
</body>
</html>
